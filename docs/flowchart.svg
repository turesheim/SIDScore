<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs>
    <style>
      .box { fill:#ffffff; stroke:#111; stroke-width:2; rx:14; ry:14; }
      .lane { fill:#f6f6f6; stroke:#bbb; stroke-width:2; rx:18; ry:18; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill:#111; }
      .t { font: 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill:#111; }
      .small { font: 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill:#333; }
      .muted { fill:#666; font: 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .arrow { stroke:#111; stroke-width:2.5; fill:none; marker-end:url(#m); }
      .darrow { stroke:#444; stroke-width:2; fill:none; stroke-dasharray:6 6; marker-end:url(#m2); }
    </style>

    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <marker id="m2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="40" y="48" class="title">SIDScore → Assembly pipeline (music semantics + target back-end)</text>
  <text x="40" y="74" class="muted">Solid arrows: required stages. Dashed arrows: optional/target-specific steps.</text>

  <!-- Lanes -->
  <rect x="30" y="105" width="1340" height="235" class="lane"/>
  <text x="55" y="135" class="title" style="font-size:16px;">A. Front-end (language → meaning)</text>

  <rect x="30" y="365" width="1340" height="300" class="lane"/>
  <text x="55" y="395" class="title" style="font-size:16px;">B. Back-end (meaning → SID runtime + assembly)</text>

  <!-- Front-end boxes -->
  <rect x="60" y="160" width="210" height="95" class="box"/>
  <text x="75" y="190" class="t">SIDScore source</text>
  <text x="75" y="214" class="small">score + instruments</text>
  <text x="75" y="236" class="small">tables (wavetable, etc.)</text>

  <rect x="310" y="160" width="210" height="95" class="box"/>
  <text x="325" y="190" class="t">Lexer / Parser</text>
  <text x="325" y="214" class="small">grammar → AST</text>
  <text x="325" y="236" class="small">errors w/ locations</text>

  <rect x="560" y="160" width="230" height="95" class="box"/>
  <text x="575" y="190" class="t">Semantic analysis</text>
  <text x="575" y="214" class="small">durations, ties, tuplets</text>
  <text x="575" y="236" class="small">instrument validation</text>

  <rect x="830" y="145" width="250" height="125" class="box"/>
  <text x="845" y="175" class="t">Canonical IR</text>
  <text x="845" y="199" class="small">time-ordered events</text>
  <text x="845" y="221" class="small">note on/off + articulations</text>
  <text x="845" y="243" class="small">instrument refs + params</text>

  <rect x="1110" y="160" width="230" height="95" class="box"/>
  <text x="1125" y="190" class="t">IR scheduling</text>
  <text x="1125" y="214" class="small">voice allocation</text>
  <text x="1125" y="236" class="small">conflict resolution</text>

  <!-- Front-end arrows -->
  <path class="arrow" d="M 270 207 L 310 207"/>
  <path class="arrow" d="M 520 207 L 560 207"/>
  <path class="arrow" d="M 790 207 L 830 207"/>
  <path class="arrow" d="M 1080 207 L 1110 207"/>

  <!-- Back-end boxes -->
  <rect x="60" y="430" width="250" height="110" class="box"/>
  <text x="75" y="460" class="t">Target binding</text>
  <text x="75" y="485" class="small">SID6581 mapping</text>
  <text x="75" y="507" class="small">GATE / ADSR / waveforms</text>
  <text x="75" y="529" class="small">filter routing + constraints</text>

  <rect x="345" y="430" width="260" height="110" class="box"/>
  <text x="360" y="460" class="t">Data layout</text>
  <text x="360" y="485" class="small">tables → binary blobs</text>
  <text x="360" y="507" class="small">order, alignment, labels</text>
  <text x="360" y="529" class="small">song/instr dictionaries</text>

  <rect x="640" y="430" width="260" height="110" class="box"/>
  <text x="655" y="460" class="t">Optimizer (optional)</text>
  <text x="655" y="485" class="small">dedupe patterns</text>
  <text x="655" y="507" class="small">RLE / delta encoding</text>
  <text x="655" y="529" class="small">table sharing across songs</text>

  <rect x="935" y="430" width="260" height="110" class="box"/>
  <text x="950" y="460" class="t">Code generation</text>
  <text x="950" y="485" class="small">player calls + IRQ hooks</text>
  <text x="950" y="507" class="small">register writes schedule</text>
  <text x="950" y="529" class="small">symbols + constants</text>

  <rect x="1230" y="430" width="140" height="110" class="box"/>
  <text x="1245" y="460" class="t">Assembly</text>
  <text x="1245" y="485" class="small">KickAss/ca65</text>
  <text x="1245" y="507" class="small">link/pack</text>

  <rect x="935" y="570" width="435" height="75" class="box"/>
  <text x="950" y="600" class="t">Artifacts</text>
  <text x="950" y="624" class="small">.asm + tables + player → .prg / .psid</text>

  <!-- Back-end arrows -->
  <path class="arrow" d="M 1110 255 L 1110 325 L 185 325 L 185 430"/>
  <path class="arrow" d="M 310 485 L 345 485"/>
  <path class="darrow" d="M 605 485 L 640 485"/>
  <path class="arrow" d="M 900 485 L 935 485"/>
  <path class="arrow" d="M 1195 485 L 1230 485"/>

  <path class="arrow" d="M 1300 540 L 1300 570"/>
  <path class="arrow" d="M 1065 540 L 1065 570"/>

  <!-- Labels for merges -->
  <text x="101" y="346" class="muted">IR is synthesizer-agnostic; target binding makes it SID-specific.</text>
  <text x="657" y="558" class="muted">Optimizer is optional; correctness must not depend on it.</text>

  <!-- Small callouts -->
  <path class="darrow" d="M 185 540 C 185 585, 360 585, 360 540"/>
  <text x="205" y="605" class="small">Optional: offline validation</text>
  <text x="205" y="623" class="small">against 6581 constraints</text>

  <path class="darrow" d="M 1065 570 C 1065 640, 740 640, 740 540"/>
  <text x="705" y="660" class="small">Optional: build-time tools</text>
  <text x="705" y="678" class="small">(packer, relocator, cruncher)</text>
</svg>